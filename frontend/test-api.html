<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test API - Movilidad</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background: #0f172a;
            color: #e2e8f0;
        }
        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 20px;
        }
        h1, h2 {
            color: #3b82f6;
            margin-top: 0;
        }
        .status {
            padding: 10px;
            border-radius: 4px;
            margin: 10px 0;
            font-weight: bold;
        }
        .status.ok {
            background: #10b981;
            color: white;
        }
        .status.error {
            background: #ef4444;
            color: white;
        }
        .status.pending {
            background: #f59e0b;
            color: white;
        }
        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            margin: 5px 0;
            width: 100%;
        }
        button:hover {
            background: #2563eb;
        }
        .output {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 4px;
            padding: 10px;
            margin-top: 10px;
            font-size: 12px;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            white-space: pre-wrap;
            word-break: break-all;
        }
        input, select {
            width: 100%;
            padding: 8px;
            border: 1px solid #334155;
            border-radius: 4px;
            background: #0f172a;
            color: #e2e8f0;
            margin: 5px 0;
            box-sizing: border-box;
        }
        label {
            display: block;
            margin-top: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>🧪 Test API - Sistema de Rutas Movilidad</h1>
    
    <div class="container">
        <!-- Test Basic -->
        <div class="card">
            <h2>1️⃣ Test Básico</h2>
            <button onclick="testHealth()">Health Check</button>
            <button onclick="testStations()">Cargar Estaciones</button>
            <div id="basicStatus" class="status pending">Esperando...</div>
            <div id="basicOutput" class="output"></div>
        </div>

        <!-- Test Search -->
        <div class="card">
            <h2>2️⃣ Test Búsqueda</h2>
            <label>Origen:</label>
            <input type="text" id="origin" value="Centro" placeholder="Centro">
            
            <label>Destino:</label>
            <input type="text" id="destination" value="CUCEI" placeholder="CUCEI">
            
            <label>Hora (HH:MM):</label>
            <input type="time" id="time" value="10:00">
            
            <label>Preferencia:</label>
            <select id="preference">
                <option value="balanced">Equilibrado</option>
                <option value="fastest">Más Rápido</option>
                <option value="least_transfers">Menos Transbordos</option>
                <option value="cheapest">Más Económico</option>
            </select>
            
            <button onclick="testSearch()">Buscar Rutas</button>
            <div id="searchStatus" class="status pending">Esperando...</div>
            <div id="searchOutput" class="output"></div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8000'
        
        function log(elementId, message, isError = false) {
            const el = document.getElementById(elementId)
            if (el) {
                el.textContent = el.textContent ? el.textContent + '\n' + message : message
                el.scrollTop = el.scrollHeight
                
                // Update status
                const statusEl = document.getElementById(elementId.replace('Output', 'Status'))
                if (statusEl) {
                    statusEl.className = 'status ' + (isError ? 'error' : 'ok')
                    statusEl.textContent = isError ? '❌ Error' : '✅ Éxito'
                }
            }
        }
        
        async function testHealth() {
            document.getElementById('basicOutput').textContent = ''
            log('basicOutput', '🔄 Verificando conexión...')
            
            try {
                const response = await fetch(API_URL + '/api/health', {
                    headers: { 'Content-Type': 'application/json' }
                })
                const data = await response.json()
                log('basicOutput', 'Status: ' + response.status)
                log('basicOutput', 'Respuesta: ' + JSON.stringify(data, null, 2))
            } catch (err) {
                log('basicOutput', 'ERROR: ' + err.message, true)
            }
        }
        
        async function testStations() {
            document.getElementById('basicOutput').textContent = ''
            log('basicOutput', '🔄 Cargando estaciones...')
            
            try {
                const response = await fetch(API_URL + '/api/routes/stations', {
                    headers: { 'Content-Type': 'application/json' }
                })
                const data = await response.json()
                log('basicOutput', 'Status: ' + response.status)
                log('basicOutput', 'Total estaciones: ' + (data.stations?.length || 0))
                log('basicOutput', 'Primeras 5:')
                data.stations?.slice(0, 5).forEach(s => {
                    log('basicOutput', '  - ' + s.id + ' (' + s.lines?.join(', ') + ')')
                })
            } catch (err) {
                log('basicOutput', 'ERROR: ' + err.message, true)
            }
        }
        
        async function testSearch() {
            document.getElementById('searchOutput').textContent = ''
            const origin = document.getElementById('origin').value.trim()
            const destination = document.getElementById('destination').value.trim()
            const time = document.getElementById('time').value
            const preference = document.getElementById('preference').value
            
            log('searchOutput', '🔄 Buscando rutas...')
            log('searchOutput', 'Origen: ' + origin)
            log('searchOutput', 'Destino: ' + destination)
            log('searchOutput', 'Hora: ' + time)
            log('searchOutput', 'Preferencia: ' + preference)
            log('searchOutput', '─'.repeat(40))
            
            if (!origin || !destination) {
                log('searchOutput', 'ERROR: Debe llenar origen y destino', true)
                return
            }
            
            try {
                const payload = {
                    origin: origin,
                    destination: destination,
                    departure_time: time || null,
                    preference: preference
                }
                
                log('searchOutput', 'Payload enviado:')
                log('searchOutput', JSON.stringify(payload, null, 2))
                log('searchOutput', '─'.repeat(40))
                
                const response = await fetch(API_URL + '/api/routes/search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                })
                
                const data = await response.json()
                
                log('searchOutput', 'Status: ' + response.status)
                log('searchOutput', 'Rutas encontradas: ' + (data.routes?.length || 0))
                log('searchOutput', 'Tiempo búsqueda: ' + (data.search_time?.toFixed(2) || 'N/A') + ' ms')
                
                if (data.routes && data.routes.length > 0) {
                    log('searchOutput', '─'.repeat(40))
                    data.routes.forEach((route, idx) => {
                        log('searchOutput', 'Ruta ' + (idx + 1) + ':')
                        log('searchOutput', '  Tiempo: ' + route.metrics.total_time + ' min')
                        log('searchOutput', '  Transbordos: ' + route.metrics.transfers)
                        log('searchOutput', '  Líneas: ' + route.lines?.join(', '))
                    })
                } else if (!response.ok) {
                    log('searchOutput', 'ERROR: ' + (data.detail || 'Error desconocido'), true)
                }
            } catch (err) {
                log('searchOutput', 'ERROR: ' + err.message, true)
            }
        }
        
        // Test on load
        window.addEventListener('load', () => {
            log('basicOutput', '✓ Página cargada - lista para pruebas')
        })
    </script>
</body>
</html>
